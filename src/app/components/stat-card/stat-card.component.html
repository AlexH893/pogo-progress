<div class="stats__item dashboard-stat-card">
  <dt>{{ label }}</dt>
  <dd>
    <ng-container *ngIf="value !== null && !isEditing">
      <div class="stat-display">
        <span class="stat-val">{{ displayValue }}</span>
        <span class="floating-diff" *ngIf="isAnimating && diff && diff > 0">{{ formattedDiff }}</span>
        <button class="edit-btn" (click)="toggleEdit()"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>
      </div>
    </ng-container>
    <ng-container *ngIf="value === null || isEditing">
      <div class="missing-stat">
        <span class="missing-dash" *ngIf="value === null">—</span>
        <div class="correction-box">
          <input #valInput type="number" [step]="step" [value]="value !== null ? value : ''" [placeholder]="placeholder" (keyup.enter)="submitCorrection(valInput.value)" />
          <button (click)="submitCorrection(valInput.value)">Save</button>
        </div>
      </div>
    </ng-container>
  </dd>
</div>
