<section *ngIf="funFact" class="fun-fact glass-card" style="margin-top: 1.5rem; display: flex; align-items: flex-start; gap: 1rem;">
  <div class="fun-fact-icon" style="color: #fbc02d;">
    <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A6 6 0 1 0 7.5 11.5c.76.76 1.23 1.52 1.41 2.5"></path>
    </svg>
  </div>
  <div class="fun-fact-content" style="flex: 1;">
    <h3 style="margin: 0 0 0.25rem 0; font-size: 1.1rem; color: #fbc02d;">Did you know?</h3>
    <p style="margin: 0; color: #e8f5e9; font-size: 0.95rem; line-height: 1.5;">{{ funFact }}</p>
  </div>
  <button class="edit-btn" (click)="onShuffle()" aria-label="Shuffle Fun Fact" style="margin-left: auto;">
    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 3 21 8"></polyline>
      <line x1="4" y1="20" x2="21" y2="3"></line>
      <polyline points="21 16 21 21 16 21"></polyline>
      <line x1="15" y1="15" x2="21" y2="21"></line>
      <line x1="4" y1="4" x2="9" y2="9"></line>
    </svg>
  </button>
</section>
